name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing — no token stored in the repo.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"  # Angular 22 requires Node ^22.22.3 || ^24.15.0 || >=26

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Angular bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Stage bundle into package
        run: |
          rm -rf theia_ng/static/theia_ng
          mkdir -p theia_ng/static/theia_ng
          cp -R frontend/dist/theia_ng/browser/. theia_ng/static/theia_ng/

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
