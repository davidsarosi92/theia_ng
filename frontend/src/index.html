<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Theia NG Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Django injects window.__THEIA_NG_CONFIG__ before </head> at serve time. -->
    <!-- Apply the saved theme before first paint to avoid a light/dark flash.
         Stores the *preference*; `auto` is resolved against the OS here too. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('theia-ng:theme') || 'auto';
          var dark =
            pref === 'dark' ||
            (pref === 'auto' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <theia-root></theia-root>
  </body>
</html>
