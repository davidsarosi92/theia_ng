[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "theia_ng"
version = "0.3.0"
description = "Theia NG — a dynamic Angular admin for Django, generated from your models."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "David Sarosi" }]
keywords = ["django", "admin", "angular", "crud", "introspection"]
classifiers = [
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Framework :: Django :: 5.2",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]

# Core depends ONLY on django.contrib.auth (via Django itself) — NOT on DRF.
dependencies = [
    "Django>=4.2",
]

[project.optional-dependencies]
# Optional delegation adapters. Installed only if the host project wants them.
drf = ["djangorestframework>=3.14"]
dev = [
    "pytest",
    "pytest-django",
    "build",
]

[project.urls]
Homepage = "https://github.com/davidsarosi92/theia_ng"
Issues = "https://github.com/davidsarosi92/theia_ng/issues"

# ---------------------------------------------------------------------------
# Packaging
# ---------------------------------------------------------------------------
# The pre-built Angular bundle is produced by `frontend/` and copied into
# theia_ng/static/theia_ng/ by the custom build hook below BEFORE the wheel is
# assembled. The bundle itself is NOT committed to git (see .gitignore); CI
# builds it fresh on release.
[tool.hatch.build.targets.wheel]
packages = ["theia_ng"]

[tool.hatch.build.targets.wheel.force-include]
"theia_ng/static" = "theia_ng/static"

# Custom build hook: runs `ng build` and stages the dist into the package.
# See hatch_build.py at the repo root.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.testproject.settings"
python_files = ["test_*.py", "tests.py"]
